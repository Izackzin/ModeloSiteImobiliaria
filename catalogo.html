<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo | Plano Gestão</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
}

body{
 font-family:'Montserrat',sans-serif;
 background:#F8F6F2;
}

:root{

 --wine:#5C0B1A;
 --wine-light:#7A1227;
 --wine-soft:#B35A6B;

}

.container{
 width:min(1400px,92%);
 margin:auto;
}

header{

 height:420px;

 background:
 linear-gradient(rgba(15,0,5,.8),rgba(0,0,0,.7)),
 url('https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=2070&auto=format&fit=crop');

 background-size:cover;
 background-position:center;

 color:white;

 display:flex;
 align-items:center;
 justify-content:center;

 text-align:center;

}

header h1{

 font-family:'Cormorant Garamond',serif;

 font-size:5rem;

}

.catalog{
 padding:120px 0;
}

.cards{

 display:grid;

 grid-template-columns:repeat(3,1fr);

 gap:35px;

}

.card{

 background:white;

 overflow:hidden;

}

.card-image{

 height:380px;

 position:relative;

}

.card-image img{

 width:100%;
 height:100%;

 object-fit:cover;

}

.badge{

 position:absolute;

 top:20px;
 left:20px;

 background:
 linear-gradient(
 135deg,
 var(--wine),
 var(--wine-light)
 );

 color:white;

 padding:10px 18px;

 font-size:.7rem;

 letter-spacing:3px;

}

.card-content{
 padding:35px;
}

.card-content h3{

 font-family:'Cormorant Garamond',serif;

 font-size:2rem;

 margin-bottom:10px;

}

.location{

 color:var(--wine-soft);

 margin-bottom:18px;

 letter-spacing:2px;

 text-transform:uppercase;

 font-size:.8rem;

}

.details{

 display:flex;

 justify-content:space-between;

 border-top:1px solid #eee;

 padding-top:20px;

 margin-top:20px;

}

.back-btn{

 position:fixed;

 top:30px;
 left:30px;

 background:
 linear-gradient(
 135deg,
 var(--wine),
 var(--wine-light)
 );

 color:white;

 padding:15px 24px;

 text-decoration:none;

 text-transform:uppercase;

 letter-spacing:2px;

 font-size:.75rem;

}

@media(max-width:1100px){

 .cards{
 grid-template-columns:1fr 1fr;
 }

}

@media(max-width:768px){

 .cards{
 grid-template-columns:1fr;
 }

 header h1{
 font-size:3rem;
 }

}

</style>

</head>

<body>

<a href="Plano.html" class="back-btn">
Voltar
</a>

<header>

<div>

<h1>Catálogo Exclusivo</h1>

</div>

</header>

<section class="catalog">

<div class="container">

<div class="cards">

<div class="card">

<div class="card-image">

<img src="https://images.unsplash.com/photo-1600047509807-ba8f99d2cdde?q=80&w=2070&auto=format&fit=crop">

<div class="badge">
NOVO
</div>

</div>

<div class="card-content">

<h3>Villa Supreme</h3>

<div class="location">
Lago Norte
</div>

<p>
Residência moderna com fachada minimalista.
</p>

<div class="details">

<span>920m²</span>
<span>5 suítes</span>
<span>7 vagas</span>

</div>

</div>

</div>

</div>

</div>

</section>

</body>
</html>
